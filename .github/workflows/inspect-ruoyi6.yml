name: Inspect RuoYi 6.X APIs

on:
  push:
    paths:
      - '.github/workflows/inspect-ruoyi6.yml'

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Clone pinned RuoYi 6.X
        run: |
          git clone --filter=blob:none --no-checkout https://github.com/dromara/RuoYi-Vue-Plus.git ruoyi6
          cd ruoyi6
          git checkout da5f30cae2deb174a1ba37a2ad41ff1ba42c9f38
      - name: Collect relevant APIs
        run: |
          mkdir inspect
          cp ruoyi6/pom.xml inspect/root-pom.xml
          find ruoyi6 -type f \( -name '*Tenant*.java' -o -name '*LoginUser*.java' -o -name 'LoginHelper.java' -o -name 'SecurityConfig.java' -o -name 'SecurityProperties.java' -o -name 'ISysUserService.java' -o -name 'ISysDeptService.java' -o -name 'ISysRoleService.java' -o -name 'ISysPostService.java' -o -name 'ISysTenantService.java' -o -name 'SysUserVo.java' -o -name 'SysDeptVo.java' -o -name 'SysRoleVo.java' -o -name 'SysPostVo.java' -o -name 'SysUserPost.java' -o -name 'SysUserPostMapper.java' \) -print0 | while IFS= read -r -d '' file; do
            target="inspect/${file#ruoyi6/}"
            mkdir -p "$(dirname "$target")"
            cp "$file" "$target"
          done
          cp ruoyi6/ruoyi-admin/pom.xml inspect/ruoyi-admin-pom.xml
          cp ruoyi6/ruoyi-extend/pom.xml inspect/ruoyi-extend-pom.xml
          cp ruoyi6/ruoyi-modules/pom.xml inspect/ruoyi-modules-pom.xml
          find inspect -type f | sort > inspect/files.txt
      - uses: actions/upload-artifact@v4
        with:
          name: ruoyi6-api-inspection
          path: inspect
          if-no-files-found: error
