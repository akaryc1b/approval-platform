name: PR M2 Form Design Validation

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: pr-m2-form-design-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Maven reactor, Checkstyle, architecture and PostgreSQL tests
        run: |
          set -o pipefail
          mvn -B -ntp verify 2>&1 | tee backend.log
      - name: Upload backend validation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-validation-log
          path: backend.log
      - name: Upload form design source for diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: form-design-source
          path: server-modules/approval-application/src/main/java/io/github/akaryc1b/approval/application/ApprovalFormDesignService.java

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.18.0'
      - name: Vben TypeScript and production build
        run: |
          set -o pipefail
          pnpm web:install 2>&1 | tee web.log
          pnpm web:typecheck 2>&1 | tee -a web.log
          pnpm web:build 2>&1 | tee -a web.log
      - name: Upload web validation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-validation-log
          path: web.log

  mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.18.0'
      - name: UniApp TypeScript, H5 and WeChat builds
        run: |
          set -o pipefail
          pnpm mobile:install 2>&1 | tee mobile.log
          pnpm mobile:typecheck 2>&1 | tee -a mobile.log
          pnpm mobile:build:h5 2>&1 | tee -a mobile.log
          pnpm mobile:build:weixin 2>&1 | tee -a mobile.log
      - name: Upload mobile validation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-validation-log
          path: mobile.log
