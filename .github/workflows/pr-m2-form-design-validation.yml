name: PR M2 Form Design Validation

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: pr-m2-form-design-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  source-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Remove known unused persistence test import
        run: |
          file=server-modules/approval-persistence-jdbc/src/test/java/io/github/akaryc1b/approval/persistence/jdbc/JdbcApprovalFormDesignIntegrationTest.java
          sed -i '/java.util.List;/d' "$file"
          if git diff --quiet -- "$file"; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add "$file"
          git commit -m "Fix form design integration test Checkstyle import"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

  backend:
    needs: source-fix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Maven reactor, Checkstyle, architecture and PostgreSQL tests
        run: |
          set -o pipefail
          mvn -B -ntp verify 2>&1 | tee backend.log
      - name: Upload backend validation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-validation-log
          path: backend.log

  web:
    needs: source-fix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.18.0'
      - name: Vben TypeScript and production build
        run: |
          set -o pipefail
          pnpm web:install 2>&1 | tee web.log
          pnpm web:typecheck 2>&1 | tee -a web.log
          pnpm web:build 2>&1 | tee -a web.log
      - name: Upload web validation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-validation-log
          path: web.log

  mobile:
    needs: source-fix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.18.0'
      - name: UniApp TypeScript, H5 and WeChat builds
        run: |
          set -o pipefail
          pnpm mobile:install 2>&1 | tee mobile.log
          pnpm mobile:typecheck 2>&1 | tee -a mobile.log
          pnpm mobile:build:h5 2>&1 | tee -a mobile.log
          pnpm mobile:build:weixin 2>&1 | tee -a mobile.log
      - name: Upload mobile validation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-validation-log
          path: mobile.log
