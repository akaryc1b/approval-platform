name: Generic Spring Host CI

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - uses: actions/setup-node@v4
        with:
          node-version: '22.18.0'

      - name: Build and test standalone Host
        run: mvn -B -ntp -pl examples/generic-spring-host -am verify

      - name: Start standalone Host
        env:
          EXAMPLE_HOST_SECRET: 0123456789abcdef0123456789abcdef
          EXAMPLE_HOST_TOKEN: smoke-token
          EXAMPLE_HOST_TENANT_ID: demo
          EXAMPLE_HOST_KEY_ID: demo-key
          EXAMPLE_HOST_SOURCE: generic
        run: |
          set -euo pipefail
          host_jar=$(find examples/generic-spring-host/target \
            -maxdepth 1 -type f -name 'approval-generic-spring-host-example-*.jar' \
            ! -name '*.original' | head -1)
          test -n "$host_jar"
          nohup java -jar "$host_jar" >generic-spring-host.log 2>&1 &
          echo $! >generic-spring-host.pid

          for attempt in $(seq 1 60); do
            if curl --silent --fail http://127.0.0.1:18080/actuator/health \
              | grep -q '"status":"UP"'; then
              exit 0
            fi
            if ! kill -0 "$(cat generic-spring-host.pid)" 2>/dev/null; then
              cat generic-spring-host.log
              exit 1
            fi
            sleep 1
          done
          cat generic-spring-host.log
          exit 1

      - name: Run signed end-to-end smoke suite
        env:
          APPROVAL_HOST_URL: http://127.0.0.1:18080
          APPROVAL_TENANT_ID: demo
          APPROVAL_KEY_ID: demo-key
          APPROVAL_HOST_SECRET: 0123456789abcdef0123456789abcdef
          APPROVAL_SOURCE: generic
          APPROVAL_CREDENTIAL: smoke-token
        run: |
          set -euo pipefail
          node examples/connector-smoke/cli.mjs suite >generic-host-suite.json
          node --input-type=module <<'NODE'
          import { readFile } from 'node:fs/promises';
          const result = JSON.parse(await readFile('generic-host-suite.json', 'utf8'));
          if (result.authentication?.data?.principal?.username !== 'alice') {
            throw new Error('Unexpected authenticated principal.');
          }
          if (result.user?.data?.id?.value !== '100') {
            throw new Error('Current-user lookup did not return user 100.');
          }
          if (result.search?.data?.total !== 1) {
            throw new Error('User search did not return exactly one fixture principal.');
          }
          if (result.managers?.data?.items?.[0]?.username !== 'bob') {
            throw new Error('Manager-chain lookup did not return bob.');
          }
          NODE

      - name: Verify credential failures are redacted
        env:
          APPROVAL_HOST_URL: http://127.0.0.1:18080
          APPROVAL_TENANT_ID: demo
          APPROVAL_KEY_ID: demo-key
          APPROVAL_HOST_SECRET: 0123456789abcdef0123456789abcdef
          APPROVAL_SOURCE: generic
          APPROVAL_CREDENTIAL: never-print-this-token
        run: |
          set -euo pipefail
          set +e
          node examples/connector-smoke/cli.mjs auth \
            >invalid-auth.stdout 2>invalid-auth.stderr
          status=$?
          set -e
          test "$status" -ne 0
          grep -q 'INVALID_CREDENTIAL' invalid-auth.stderr
          ! grep -q 'never-print-this-token' invalid-auth.stdout invalid-auth.stderr
          ! grep -q '0123456789abcdef0123456789abcdef' \
            invalid-auth.stdout invalid-auth.stderr

      - name: Stop standalone Host
        if: always()
        run: |
          if test -f generic-spring-host.pid; then
            kill "$(cat generic-spring-host.pid)" 2>/dev/null || true
          fi

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: generic-spring-host-diagnostics
          path: |
            generic-spring-host.log
            generic-host-suite.json
            invalid-auth.stdout
            invalid-auth.stderr
          if-no-files-found: ignore
