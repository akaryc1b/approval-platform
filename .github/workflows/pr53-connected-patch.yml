name: PR 53 Connected Patch

on:
  push:
    branches:
      - agent/m2-release-deployment-and-designer-hardening

permissions:
  contents: write

concurrency:
  group: pr53-connected-patch
  cancel-in-progress: false

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Apply connected patch
        shell: bash
        run: |
          set -euo pipefail
          payload=.github/pr53-connected-patch.tgz.b64
          if [ ! -f "$payload" ]; then
            echo 'No connected patch payload found.'
            exit 0
          fi
          base64 --decode "$payload" | tar -xzf -
          rm "$payload"
          git diff --check
      - name: Verify backend patch
        shell: bash
        run: |
          set +e
          mvn -B -ntp verify >connected-patch-maven.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            echo '--- Maven failure tail ---'
            tail -n 260 connected-patch-maven.log
            exit "$status"
          fi
          tail -n 100 connected-patch-maven.log
      - name: Commit verified patch
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo 'Patch produced no changes.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat: add approval release version queries and structural diff'
          git push origin HEAD:${{ github.ref_name }}
      - name: Upload verification log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr53-connected-patch-${{ github.run_id }}
          path: connected-patch-maven.log
          if-no-files-found: ignore
