name: PR 53 Patch Diagnostics

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  push:
    branches:
      - agent/m2-release-deployment-and-designer-hardening

permissions:
  contents: read

concurrency:
  group: pr53-patch-diagnostics-${{ github.ref }}
  cancel-in-progress: true

jobs:
  diagnose:
    name: Diagnose queued patch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run exact patch helper
        id: apply
        continue-on-error: true
        shell: bash
        run: |
          set +e
          if [ -f .github/scripts/apply-pr53-connected-patch.sh ]; then
            bash .github/scripts/apply-pr53-connected-patch.sh \
              >pr53-patch-apply.log 2>&1
            status=$?
          else
            echo 'Patch helper is missing.' >pr53-patch-apply.log
            status=2
          fi
          cat pr53-patch-apply.log
          echo "status=$status" >>"$GITHUB_OUTPUT"
          exit "$status"
      - name: Upload patch diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr53-patch-diagnostics-${{ github.run_id }}
          path: pr53-patch-apply.log
          if-no-files-found: error
      - name: Fail after diagnostics upload
        if: steps.apply.outputs.status != '0'
        shell: bash
        run: exit 1
