name: PR M2 UI Schema Validation

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: pr-m2-ui-schema-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Maven reactor, Checkstyle, architecture and PostgreSQL tests
        run: mvn -B -ntp verify

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.18.0'
      - name: Bootstrap and install Vben
        run: pnpm web:install
      - name: TypeScript
        run: pnpm web:typecheck
      - name: Production build
        run: pnpm web:build

  mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.18.0'
      - name: Bootstrap and install UniApp
        run: pnpm mobile:install
      - name: TypeScript
        run: pnpm mobile:typecheck
      - name: H5 production build
        run: pnpm mobile:build:h5
      - name: WeChat Mini Program production build
        run: pnpm mobile:build:weixin
