name: Approval Web CI

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: '22.18.0'
      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.33.4 --activate
      - name: Prepare pinned Vben workspace
        run: pnpm web:bootstrap
      - name: Install Vben dependencies
        run: pnpm --dir .upstream/vben install --frozen-lockfile
      - name: Type check approval web
        run: pnpm --dir .upstream/vben --filter @vben/web-ele typecheck
      - name: Build approval web
        run: pnpm --dir .upstream/vben build:ele
