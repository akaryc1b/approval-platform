name: PR M2 Approval DSL Core Validation

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: pr-m2-approval-dsl-core-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Maven reactor, Checkstyle, architecture and tests
        run: |
          set -o pipefail
          mvn -B -ntp verify 2>&1 | tee backend.log
      - name: Upload backend log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: approval-dsl-core-backend-log
          path: backend.log

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.18.0'
      - name: Vben TypeScript and production build
        run: |
          set -o pipefail
          pnpm web:install 2>&1 | tee web.log
          pnpm web:typecheck 2>&1 | tee -a web.log
          pnpm web:build 2>&1 | tee -a web.log
      - name: Upload web log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: approval-dsl-core-web-log
          path: web.log
