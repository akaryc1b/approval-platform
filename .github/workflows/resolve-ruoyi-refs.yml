name: Resolve RuoYi Upstream Refs

on:
  push:
    paths:
      - '.github/workflows/resolve-ruoyi-refs.yml'
  pull_request:
    paths:
      - '.github/workflows/resolve-ruoyi-refs.yml'

permissions:
  contents: read

jobs:
  resolve:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve branch commits
        run: |
          git ls-remote https://github.com/dromara/RuoYi-Vue-Plus.git \
            refs/heads/5.X refs/heads/6.X | tee ruoyi-refs.txt
      - uses: actions/upload-artifact@v4
        with:
          name: ruoyi-upstream-refs
          path: ruoyi-refs.txt
          if-no-files-found: error
