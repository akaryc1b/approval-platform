name: Apply PR 51 Compile Fixes

on:
  push:
    branches: [agent/m2-visual-form-designer]

permissions:
  contents: write

jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message, '[pr51-fix-applied]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/m2-visual-form-designer
      - name: Apply reviewed compile fixes
        shell: python
        run: |
          from pathlib import Path

          validator = Path('server-modules/approval-application/src/main/java/io/github/akaryc1b/approval/application/FormDefinitionValidator.java')
          text = validator.read_text()
          replacements = {
              '        require(constraints.minItems(), "SELECT minItems", field);\n': '',
              '        if (!constraints.multiple() && constraints.minItems() > 1) {':
                  '        Integer minimumItems = constraints.minItems();\n'
                  '        if (!constraints.multiple() && minimumItems != null && minimumItems > 1) {',
              'field.type() + \' \' + name + " must be numeric: " + field.key()':
                  'field.type() + " " + name + " must be numeric: " + field.key()',
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'Missing expected Java fragment: {old!r}')
              text = text.replace(old, new, 1)
          validator.write_text(text)

          view = Path('apps/web/overlay/apps/web-ele/src/views/approval/forms/index.vue')
          text = view.read_text()
          replacements = {
              "  RequiredOverride,\n": "",
              "  UiFieldLayout,\n": "",
              "const statusOptions: Array<{ label: string; value?: FormDesignDraftStatus }> = [\n  { label: '全部状态' },\n":
                  "const statusOptions: Array<{ label: string; value: FormDesignDraftStatus }> = [\n",
              "const selectedField = computed(() => {\n  if (selection.value?.kind !== 'field' || !formDefinition.value) return undefined;\n  return formDefinition.value.fields.find(item => item.key === selection.value?.fieldKey);\n});\nconst selectedLayout = computed(() => {\n  if (selection.value?.kind !== 'field') return undefined;\n  return selectedSection.value?.fields.find(item => item.fieldKey === selection.value?.fieldKey);\n});":
                  "const selectedField = computed(() => {\n  const selected = selection.value;\n  if (!selected || selected.kind !== 'field' || !formDefinition.value) return undefined;\n  return formDefinition.value.fields.find(item => item.key === selected.fieldKey);\n});\nconst selectedLayout = computed(() => {\n  const selected = selection.value;\n  if (!selected || selected.kind !== 'field') return undefined;\n  return selectedSection.value?.fields.find(item => item.fieldKey === selected.fieldKey);\n});",
              '<ElSelect v-model="selectedField.type" :disabled="!editable">':
                  '<ElSelect :model-value="selectedField.type" disabled>',
              '<ElInput v-model="selectedDefault.literal" :disabled="!editable" />':
                  '<ElInput\n                      :model-value="String(selectedDefault.literal ?? \'\')"\n                      :disabled="!editable"\n                      @update:model-value="setLiteralDefault"\n                    />',
              "function removeOption(index: number) {\n  selectedField.value?.options?.splice(index, 1);\n}\n":
                  "function removeOption(index: number) {\n  selectedField.value?.options?.splice(index, 1);\n}\n\nfunction setLiteralDefault(value: string) {\n  if (selectedDefault.value) selectedDefault.value.literal = value;\n}\n",
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'Missing expected Vue fragment: {old!r}')
              text = text.replace(old, new, 1)
          view.write_text(text)
      - name: Commit fixes
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add server-modules/approval-application/src/main/java/io/github/akaryc1b/approval/application/FormDefinitionValidator.java \
            apps/web/overlay/apps/web-ele/src/views/approval/forms/index.vue
          git commit -m "Fix visual designer validation compilation [pr51-fix-applied]"
          git push origin HEAD:agent/m2-visual-form-designer
