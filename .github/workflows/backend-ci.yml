name: Backend CI

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Verify backend
        run: |
          set -o pipefail
          mvn -B -ntp verify 2>&1 | tee backend-ci.log
      - name: Upload backend failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-ci-log
          path: backend-ci.log
          if-no-files-found: error
