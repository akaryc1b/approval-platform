name: Backend CI

on:
  push:
    paths:
      - 'pom.xml'
      - 'apps/server/**'
      - 'server-modules/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    paths:
      - 'pom.xml'
      - 'apps/server/**'
      - 'server-modules/**'
      - '.github/workflows/backend-ci.yml'

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Verify backend
        run: mvn -B -ntp verify
