server:
  port: ${SERVER_PORT:18080}
  shutdown: graceful

spring:
  application:
    name: approval-generic-spring-host-example

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

example:
  host:
    source: ${EXAMPLE_HOST_SOURCE:generic}
    tenant-id: ${EXAMPLE_HOST_TENANT_ID:demo}
    tenant-name: ${EXAMPLE_HOST_TENANT_NAME:Generic Spring Host}
    key-id: ${EXAMPLE_HOST_KEY_ID:demo-key}
    secret: ${EXAMPLE_HOST_SECRET:}
    bearer-token: ${EXAMPLE_HOST_TOKEN:}
    allowed-clock-skew: ${EXAMPLE_HOST_CLOCK_SKEW:5m}
    nonce-ttl: ${EXAMPLE_HOST_NONCE_TTL:10m}

logging:
  level:
    root: INFO
    io.github.akaryc1b.approval.example.host: INFO
